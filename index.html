<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special for Atika Junia ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            background: rgba(255, 255, 255, 0.88);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
            backdrop-filter: blur(10px);
            animation: fadeIn 1s ease-in-out;
            z-index: 10;
        }

        .heart-icon {
            font-size: 50px;
            color: #ff477e;
            animation: heartbeat 1.2s infinite;
            margin-bottom: 15px;
        }

        h2 {
            color: #ff477e;
            font-size: 20px;
            margin-bottom: 20px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border: 2px solid #ffb3c6;
            border-radius: 12px;
            resize: none;
            outline: none;
            font-size: 15px;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        textarea:focus {
            border-color: #ff477e;
            box-shadow: 0 0 10px rgba(255, 71, 126, 0.2);
        }

        button {
            background-color: #ff477e;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.4);
        }

        button:hover {
            background-color: #ff0a54;
            transform: translateY(-2px);
        }

        /* Animasi Sweet / Pop-up */
        .sweet-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 194, 209, 0.9);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 99;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .sweet-text {
            font-size: 26px;
            color: #ff0a54;
            font-weight: bold;
            margin-top: 15px;
            animation: pop 0.6s ease-in-out infinite alternate;
        }

        /* Layar Akhir & Tombol Pindah */
        .final-screen {
            display: none;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            position: relative;
            height: 50px;
        }

        #btn-no {
            position: absolute;
            background-color: #6c757d;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.1s ease;
        }
        #btn-no:hover {
            background-color: #495057;
        }

        /* Keyframes Animasi */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            20% { transform: scale(1.1); }
            40% { transform: scale(1.15); }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pop {
            from { transform: scale(0.9); }
            to { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <!-- OVERLAY ANIMASI SWEET -->
    <div id="sweet-overlay" class="sweet-overlay">
        <div style="font-size: 60px;">✨💖✨</div>
        <div class="sweet-text" id="sweet-message">Aww.. Sosweet Banget! 🥰</div>
    </div>

    <!-- UTAMA CONTAINER -->
    <div class="container">
        
        <!-- BAGIAN PERTANYAAN (1, 2, 3) -->
        <div id="question-section">
            <div class="heart-icon" id="main-heart">❤️</div>
            <h2 id="question-title"></h2>
            <textarea id="answer-input" placeholder="Ketik jawabanmu di sini ya Atika... ✨"></textarea>
            <br>
            <button onclick="nextQuestion()" id="btn-next">Lanjut Atika mbul.. ➡️</button>
        </div>

        <!-- BAGIAN AKHIR (MAAF & TOMBOL PILIHAN) -->
        <div id="final-section" class="final-screen">
            <div class="heart-icon">🥺💔</div>
            <h2 style="color: #d90429;">Maaf yaa sayangg udah bikin kamu sakit hati... 🥺👉👈</h2>
            <p style="font-size: 14px; color: #6c757d; margin-bottom: 10px;">Atika Junia mau dimaafin kan?</p>
            
            <div class="btn-container" id="box-tombol">
                <button id="btn-yes" onclick="dimaafin()">Dimaafin 🥰</button>
                <button id="btn-no" onmouseover="pindahTombol()" onclick="pindahTombol()">Engga 😜</button>
            </div>
        </div>

    </div>

    <script>
        const questions = [
            {
                text: "Pertanyaan pertama:\nHal apa yang mau kamu lakuin bareng aku, Atika? 🤔",
                sweet: "Aww.. ga sabar lakuin itu bareng kamu! 🥰💖"
            },
            {
                text: "Pertanyaan kedua:\nApa barang yang kamu mau dari aku? 🎁",
                sweet: "Dicatat yaa sayang, nanti aku kabulin! 🤫✨"
            },
            {
                text: "Pertanyaan ketiga:\nTempat mana yang mau kamu kunjungi bareng aku? ✈️",
                sweet: "Otw nabung buat kita liburan bareng! 🏃‍♂️💨"
            }
        ];

        let currentStep = 0;
        let dataJawaban = [];
        let typingTimeout;

        function typeEffect(txt, elementId, speed = 40) {
            let i = 0;
            const element = document.getElementById(elementId);
            element.innerHTML = "";
            
            function type() {
                if (i < txt.length) {
                    if (txt.charAt(i) === "\n") {
                        element.innerHTML += "<br>";
                    } else {
                        element.innerHTML += txt.charAt(i);
                    }
                    i++;
                    typingTimeout = setTimeout(type, speed);
                }
            }
            type();
        }

        window.onload = function() {
            typeEffect(questions[0].text, "question-title");
        };

        function nextQuestion() {
            const inputEl = document.getElementById("answer-input");
            const jawaban = inputEl.value.trim();

            if (jawaban === "") {
                alert("Jawab dulu dong Atika, jangan dikosongin yaa mbul.. 🥺");
                return;
            }

            dataJawaban.push(jawaban);
            
            const overlay = document.getElementById("sweet-overlay");
            document.getElementById("sweet-message").innerText = questions[currentStep].sweet;
            overlay.style.display = "flex";
            setTimeout(() => overlay.style.opacity = "1", 10);

            setTimeout(() => {
                overlay.style.opacity = "0";
                setTimeout(() => {
                    overlay.style.display = "none";
                    currentStep++;
                    inputEl.value = "";

                    if (currentStep < questions.length) {
                        typeEffect(questions[currentStep].text, "question-title");
                    } else {
                        document.getElementById("question-section").style.display = "none";
                        document.getElementById("final-section").style.display = "block";
                        resetPosisiTombol();
                    }
                }, 500);
            }, 2500);
        }

        function pindahTombol() {
            const btnNo = document.getElementById("btn-no");
            const container = document.getElementById("box-tombol");
            
            const padding = 40;
            const maxX = container.clientWidth - btnNo.clientWidth - padding;
            const maxY = 150;

            const randomX = Math.floor(Math.random() * (maxX + padding)) - (padding/2);
            const randomY = Math.floor(Math.random() * maxY) - (maxY/2);

            btnNo.style.left = randomX + "px";
            btnNo.style.top = randomY + "px";
        }

        function resetPosisiTombol() {
            const btnNo = document.getElementById("btn-no");
            btnNo.style.right = "20px";
            btnNo.style.top = "0px";
        }

        // Fungsi Kirim ke Gmail via Formspree Backend milik Farel
        function dimaafin() {

    const formspreeUrl = "https://formspree.io/f/mjgdqodv"; 

    const formData = new FormData();
    formData.append("Nama Pacar", "Atika Junia");
    formData.append("Pertanyaan 1 (Aktivitas)", dataJawaban[0]);
    formData.append("Pertanyaan 2 (Barang)", dataJawaban[1]);
    formData.append("Pertanyaan 3 (Tempat)", dataJawaban[2]);
    formData.append("Status Maaf", "SUDAH DIMAAFIN! 🥰❤️");

    fetch(formspreeUrl, {
        method: "POST",
        body: formData,
        headers: {
            'Accept': 'application/json'
        }
    })
    .then(response => {
        if (response.ok) {
            // Jalankan animasi konfeti meriah
            jalankanKonfetiMeriah();
            
            // Munculkan pop-up kustom
            document.getElementById('customAlert').style.display = 'block';
        } else {
            alert("Aduh, ada sedikit kendala saat mengirim pesan.");
        }
    })
    .catch(error => {
        alert("Terjadi kesalahan jaringan, silakan coba lagi.");
    });
}

    });

            });
        }
    </script>
    <!-- Elemen Pop-up Kustom Cantik -->
<div id="customAlert" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; width: 85%; max-width: 350px; z-index: 9999; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
    <h2 style="font-size: 2rem; margin-bottom: 10px;">🎉 ❤️ 🎉</h2>
    <p style="font-family: 'Poppins', sans-serif; font-size: 1.1rem; color: #333; line-height: 1.5; margin: 0;">
        Yeayyy! Makasih banyak ya <strong>Atika Junia</strong> udah dimaafın.. akuu sayangg kamu bangett 🥺🥺❤️❤️
    </p>
    <button onclick="document.getElementById('customAlert').style.display = 'none';" style="margin-top: 15px; background: #ff4b5c; color: white; border: none; padding: 10px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; width: 100%;">Love You!</button>
</div>

<!-- Script Library Konfeti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
function jalankanKonfetiMeriah() {
    var duration = 5 * 1000;
    var animationEnd = Date.now() + duration;
    var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 10000 };

    function randomInRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    var interval = setInterval(function() {
      var timeLeft = animationEnd - Date.now();

      if (timeLeft <= 0) {
        return clearInterval(interval);
      }

      var particleCount = 50 * (timeLeft / duration);
      confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
      confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
    }, 250);
}
</script>

<style>
@keyframes popIn {
    0% { transform: translate(-50%, -50%) scale(0.7); opacity: 0; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}
</style>

</body>
</html>
